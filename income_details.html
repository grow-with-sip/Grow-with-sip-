<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Details</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        .header { background: #1a237e; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; margin: 20px; background: #d0dceb; border-radius: 8px; padding: 4px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: bold; color: #1a237e; }
        .tab.active { background: white; }
        .card { background: white; margin: 0 20px 10px 20px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .amount { color: green; font-weight: bold; font-size: 16px; }
        .desc { font-weight: bold; font-size: 14px; }
        .date { font-size: 11px; color: #888; margin-top: 4px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const db = getDatabase(initializeApp({ 
            databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com" 
        }));

        window.showIncome = async function(type) {
            document.getElementById('tabMy').classList.toggle('active', type === 'my');
            document.getElementById('tabSub').classList.toggle('active', type === 'sub');
            
            let container = document.getElementById('recordList');
            let phone = localStorage.getItem('loggedInUserId');
            if (!phone) return;
            
            container.innerHTML = "Loading...";

            const userRef = ref(db, 'users/' + phone);
            const snapshot = await get(userRef);

            if (snapshot.exists()) {
                const data = snapshot.val();
                container.innerHTML = "";
                
                if (type === 'my') {
                    const incomeHistory = data.incomeHistory || {};
                    const records = Object.values(incomeHistory);
                    
                    // यहाँ फिल्टर लगाया है: सिर्फ वही दिखाए जिसका नाम 'Daily Profit' है
                    const filteredRecords = records.filter(inc => inc.name === "Daily Profit");
                    
                    if (filteredRecords.length === 0) container.innerHTML = "<p style='text-align:center;'>कोई डेली प्रॉफिट नहीं है।</p>";
                    else {
                        filteredRecords.reverse().forEach(inc => {
                            container.innerHTML += `<div class="card">
                                <div><div class="desc">${inc.name}</div><div class="date">${inc.date || ''}</div></div>
                                <div class="amount">+₹${inc.amount}</div>
                            </div>`;
                        });
                    }
                } else {
                    const referralEarnings = data.referralEarnings || {};
                    const records = Object.values(referralEarnings);
                    
                    if (records.length === 0) container.innerHTML = "<p style='text-align:center;'>कोई सबऑर्डिनेट इनकम नहीं है।</p>";
                    else {
                        records.reverse().forEach(ref => {
                            container.innerHTML += `<div class="card">
                                <div><div class="desc">Referral Bonus (20%)</div><div class="date">${ref.date}</div></div>
                                <div class="amount">+₹${ref.amount}</div>
                            </div>`;
                        });
                    }
                }
            }
        };

        window.onload = () => showIncome('my');
    </script>
</head>
<body>
    <div class="header">Balance Details</div>
    <div class="tabs">
        <div class="tab active" id="tabMy" onclick="showIncome('my')">My Income</div>
        <div class="tab" id="tabSub" onclick="showIncome('sub')">Subordinate Income</div>
    </div>
    <div id="recordList"></div>
</body>
</html>
