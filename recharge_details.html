<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge Details</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #004a99; text-align: center; font-size: 20px; }
        .recharge-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; }
        .back-btn { display: block; margin-top: 20px; padding: 10px; background: #004a99; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Recharge History</h1>
    <div id="rechargeList">Loading...</div>
    <a href="my_profile.html" class="back-btn">वापस जाएं</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const db = getDatabase(initializeApp({ 
        databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com" 
    }));

    let phone = localStorage.getItem('loggedInUserId');
    let listDiv = document.getElementById('rechargeList');

    if (!phone) {
        window.location.href = "login.html";
    } else {
        // 'recharges' कलेक्शन से डेटा उठाएं
        const rechargeRef = ref(db, 'recharges');
        
        onValue(rechargeRef, (snapshot) => {
            listDiv.innerHTML = "";
            let found = false;

            snapshot.forEach((childSnapshot) => {
                let item = childSnapshot.val();
                
                // सिर्फ इस यूजर का रिचार्ज दिखाएं
                if (item.phone === phone) {
                    found = true;
                    let statusColor = item.status === 'Success' ? 'green' : 'orange';
                    
                    listDiv.innerHTML += `
                        <div class="recharge-item">
                            <div>
                                <strong>₹${item.amount}</strong><br>
                                <small style="color: #666;">${item.timestamp ? new Date(item.timestamp).toLocaleString() : 'N/A'}</small>
                            </div>
                            <div style="color: ${statusColor}; font-weight: bold;">${item.status || 'Pending'}</div>
                        </div>
                    `;
                }
            });

            if (!found) {
                listDiv.innerHTML = "<p style='text-align:center;'>कोई रिचार्ज रिकॉर्ड नहीं है।</p>";
            }
        });
    }
</script>

</body>
</html>
