<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Customer Care | Grow with SIP</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Care</h2>
    <p style="text-align:center;">Apni shikayat yahan submit karein:</p>
    
    <form id="complaintForm">
        <input type="text" id="name" placeholder="Aapka Naam" required>
        <input type="tel" id="phone" placeholder="Aapka Mobile Number" required>
        <textarea id="message" rows="4" placeholder="Apni shikayat likhein..." required></textarea>
        
        <button type="submit" id="submitBtn">Submit Shikayat</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const db = getDatabase(initializeApp({ 
        databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com" 
    }));

    document.getElementById('complaintForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Sending...";
        
        try {
            await push(ref(db, 'complaints/'), {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value,
                date: new Date().toLocaleString()
            });
            alert("✅ Shikayat successfully submit ho gayi!");
            document.getElementById('complaintForm').reset();
        } catch (error) {
            alert("❌ Error: " + error.message);
        }
        btn.innerText = "Submit Shikayat";
    });
</script>

</body>
</html>
