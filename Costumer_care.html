<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Customer Care | Grow with SIP</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Care</h2>
    <p style="text-align:center;">Apni shikayat aur screenshot yahan submit karein:</p>
    
    <!-- enctype zaroori hai file upload ke liye -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Aapka Naam" required>
        <input type="tel" name="phone" placeholder="Aapka Mobile Number" required>
        <textarea name="message" rows="4" placeholder="Apni shikayat likhein..." required></textarea>
        
        <label>Screenshot Upload Karein:</label>
        <input type="file" name="screenshot" accept="image/*">
        
        <button type="submit">Submit Shikayat</button>
    </form>
</div>

</body>
          </html>
