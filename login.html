<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mining App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const app = initializeApp({
            databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com"
        });

        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.get = get;
        window.child = child;
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #0a192f, #112240); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 30px; font-weight: bold; cursor: pointer; }
        .active { border-bottom: 3px solid #27ae60; color: #27ae60; padding-bottom: 5px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; background: #f4f4f4; border-radius: 12px; box-sizing: border-box; }
        .reg-btn { width: 100%; padding: 15px; border: none; border-radius: 25px; background: linear-gradient(to right, #27ae60, #2ecc71); color: white; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <span class="active">Login</span>
        <span onclick="window.location.href='register.html'">Register</span>
    </div>
    
    <input type="text" id="loginPhone" placeholder="Enter phone number">
    <input type="password" id="loginPass" placeholder="Enter password">
    
    <button class="reg-btn" id="loginBtn" onclick="verifyLogin()">Login Now</button>
</div>

<script>
    window.verifyLogin = async function() {
        let phone = document.getElementById('loginPhone').value;
        let pass = document.getElementById('loginPass').value;
        let btn = document.getElementById('loginBtn');

        if(!phone || !pass) { alert("कृपया सभी जानकारी भरें!"); return; }

        btn.innerText = "Checking...";
        
        try {
            // Realtime Database से यूजर चेक करें
            const dbRef = window.ref(window.db);
            const snapshot = await window.get(window.child(dbRef, 'users/' + phone));

            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.password === pass) {
                    localStorage.setItem('loggedInUserId', phone);
                    alert("✅ Login Successful!");
                    window.location.href = "my_profile.html";
                } else {
                    alert("❌ गलत पासवर्ड!");
                }
            } else {
                alert("❌ यूजर मौजूद नहीं है, कृपया रजिस्टर करें!");
            }
        } catch (error) {
            alert("Error: " + error.message);
        }
        btn.innerText = "Login Now";
    }
</script>

</body>
</html>
