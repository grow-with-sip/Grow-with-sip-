<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biviman Miner - Register</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const app = initializeApp({
            databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com"
        });

        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.set = set;
    </script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #0a192f; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        .active { border-bottom: 3px solid #27ae60; color: #27ae60; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; background: #f4f4f4; border-radius: 10px; box-sizing: border-box; }
        .reg-btn { width: 100%; padding: 15px; border: none; border-radius: 25px; background: #1a2a6c; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <span onclick="window.location.href='login.html'">Login</span>
        <span class="active">Register</span>
    </div>
    <input type="text" id="phone" placeholder="+91 Enter phone number">
    <input type="password" id="pass" placeholder="Enter new password">
    <input type="password" id="cpass" placeholder="Confirm password">
    <input type="password" id="wpass" placeholder="Set Withdrawal Password (6 digits)">
    <input type="text" id="invCode" placeholder="Invitation Code (Optional)">
    <button class="reg-btn" onclick="registerUser()">Register</button>
</div>

<script>
    window.onload = function() {
        localStorage.clear(); 
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            let invField = document.getElementById('invCode');
            invField.value = refCode;
            invField.readOnly = true;
        }
    };

    async function registerUser() {
        let phone = document.getElementById('phone').value;
        let pass = document.getElementById('pass').value;
        let cpass = document.getElementById('cpass').value;
        let wpass = document.getElementById('wpass').value;
        let invCode = document.getElementById('invCode').value;

        if (phone.length >= 10 && pass.length >= 4 && pass === cpass && wpass.length === 6) {
            try {
                // Realtime Database में डेटा सेव हो रहा है
                await set(window.ref(window.db, 'users/' + phone), {
                    mobile: phone,
                    password: pass,
                    withdrawalPassword: wpass,
                    referredBy: invCode || "", 
                    balance: 0
                });

                alert("✅ Registration Successful!");
                window.location.href = "login.html"; 
            } catch (error) {
                alert("❌ Error: " + error.message);
            }
        } else {
            alert("❌ Error: जानकारी सही से भरें (Phone min 10, Pass min 4, Withdrawal Pass 6)!");
        }
    }
</script>

</body>
</html>
