<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Details</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #004a99; text-align: center; font-size: 20px; }
        .withdrawal-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .back-btn { display: block; margin-top: 20px; padding: 10px; background: #004a99; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Withdrawal History</h1>
    <div id="withdrawalList">Loading...</div>
    <a href="my_profile.html" class="back-btn">वापस जाएं</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const db = getDatabase(initializeApp({ 
        databaseURL: "https://grow-with-sip-recharge-default-rtdb.firebaseio.com" 
    }));

    let listDiv = document.getElementById('withdrawalList');
    let currentUserId = localStorage.getItem('loggedInUserId');

    if (!currentUserId) {
        listDiv.innerHTML = "<p style='text-align:center;'>कृपया पहले लॉगिन करें।</p>";
    } else {
        const withdrawRef = ref(db, 'withdrawals');
        
        onValue(withdrawRef, (snapshot) => {
            listDiv.innerHTML = "";
            let found = false;

            snapshot.forEach((childSnapshot) => {
                let item = childSnapshot.val();
                
                // चेक करें कि क्या यह रिकॉर्ड इसी यूजर का है
                if (item.phone === currentUserId) {
                    found = true;
                    let statusColor = item.status === 'Pending' ? 'orange' : 'green';
                    
                    listDiv.innerHTML += `
                        <div class="withdrawal-item">
                            <strong>Amount: ₹${item.amount}</strong><br>
                            Status: <span style="color: ${statusColor}; font-weight:bold;">${item.status}</span><br>
                            <small>Date: ${item.timestamp ? new Date(item.timestamp).toLocaleString() : 'N/A'}</small>
                        </div>
                    `;
                }
            });

            if (!found) {
                listDiv.innerHTML = "<p style='text-align:center;'>कोई विथड्रॉल रिकॉर्ड नहीं है।</p>";
            }
        });
    }
</script>
</body>
</html>
